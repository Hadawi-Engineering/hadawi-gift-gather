<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Simple Deep Link Test</h1>
    
    <p>Testing different link formats:</p>
    
    <div style="margin: 20px 0;">
        <a href="hadawi://s/test123" style="display: block; padding: 15px; background: #007bff; color: white; text-decoration: none; margin: 10px 0; border-radius: 5px;">
            Test Short Link: hadawi://s/test123
        </a>
    </div>
    
    <div style="margin: 20px 0;">
        <a href="hadawi://occasion/direct123" style="display: block; padding: 15px; background: #28a745; color: white; text-decoration: none; margin: 10px 0; border-radius: 5px;">
            Test Direct: hadawi://occasion/direct123
        </a>
    </div>
    
    <div style="margin: 20px 0;">
        <button onclick="testDirect()" style="padding: 15px; background: #dc3545; color: white; border: none; border-radius: 5px; width: 100%;">
            Test JavaScript Direct
        </button>
    </div>
    
    <script>
        function testDirect() {
            console.log('Testing direct link...');
            window.location.href = 'hadawi://s/test123';
        }
        
        // Auto test
        setTimeout(() => {
            console.log('Auto test starting...');
            window.location.href = 'hadawi://s/test123';
        }, 3000);
    </script>
</body>
</html>
